name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    name: PHP ${{ matrix.php }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: Pest
        run: composer test

      - name: PHPStan
        run: composer test:types

      - name: Pint (check only)
        run: vendor/bin/pint --test

  drift:
    runs-on: ubuntu-latest
    name: DefaultConfig up to date with upstream
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate DefaultConfig from upstream tailwind-merge
        working-directory: bin
        run: |
          npm install --no-fund --no-audit
          node generate-default-config.mjs

      - name: Fail if DefaultConfig.php drifted
        run: |
          if ! git diff --exit-code src/DefaultConfig.php; then
            echo "::error::src/DefaultConfig.php is out of sync with upstream tailwind-merge. Run 'cd bin && npm install && node generate-default-config.mjs' and commit."
            exit 1
          fi
